name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install pandoc bash

      - name: Install bashly
        run: gem install bashly

      - name: Build CLI
        run: |
          mkdir -p dist
          bashly generate

      - name: Run unit tests
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          SKIP_INTEGRATION=1 bash test/approve

  test-apple-silicon:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install pandoc bash

      - name: Install bashly
        run: gem install bashly

      - name: Build CLI
        run: |
          mkdir -p dist
          bashly generate

      - name: Run unit tests (Apple Silicon)
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          uname -m
          SKIP_INTEGRATION=1 bash test/approve
