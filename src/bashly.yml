name: stash
help: Bidirectionally sync Markdown files with Apple Notes
version: 0.2.0

dependencies:
  pandoc:
    command: [pandoc]
    help: Install pandoc from https://pandoc.org/installing.html

commands:
- name: push
  help: Push a Markdown file or directory to Apple Notes (create or update)
  completions:
  - <file>

  flags:
  - long: --yes
    short: -y
    help: Non-interactive mode, auto-create note if missing
  - long: --folder
    short: -F
    arg: name
    help: Base Apple Notes folder path, use ':' to separate nested folders

  args:
  - name: file
    required: true
    help: Path to a Markdown file or directory to push recursively

- name: pull
  help: Pull content from Apple Notes to a Markdown file or directory
  completions:
  - <file>

  flags:
  - long: --folder
    short: -F
    arg: name
    help: Base Apple Notes folder path hint for directory sync

  args:
  - name: file
    required: true
    help: Path to a Markdown file or directory to update recursively

- name: diff
  help: Show differences between a Markdown file and its linked Apple Note
  completions:
  - <file>

  args:
  - name: file
    required: true
    help: Path to the Markdown file to compare

- name: sync
  help: Two-way sync a Markdown file or directory with Apple Notes
  completions:
  - <file>

  flags:
  - long: --yes
    short: -y
    help: Non-interactive mode, auto-create note if missing
  - long: --folder
    short: -F
    arg: name
    help: Base Apple Notes folder path, use ':' to separate nested folders
  - long: --dry-run
    short: -n
    help: Show planned actions without changing files or notes
  - long: --json
    help: Emit action records as JSON lines
  - long: --deletion-policy
    arg: mode
    help: Missing-note behavior (ignore|archive|propagate)
  - long: --mirror-path
    help: Move existing notes to match local folder path under --folder base

  args:
  - name: file
    required: true
    help: Path to a Markdown file or directory to sync recursively

- name: completions
  help: |-
    Generate bash completions
    Usage: eval "$(stash completions)"
